kind = "web"
previewPath = "/"
title = "Nyaya AI - Legal Assistant"
version = "1.0.0"
id = "artifacts/nyaya-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20788

[services.development]
run = "pnpm --filter @workspace/nyaya-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyaya-ai", "run", "build" ]
publicDir = "artifacts/nyaya-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20788"
BASE_PATH = "/"
